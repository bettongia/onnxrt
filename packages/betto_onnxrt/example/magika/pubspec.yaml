name: magika
description: >
  Filetype detection CLI using Google's Magika v3.3 ONNX model and betto_onnxrt.
  Demonstrates end-to-end model download, preprocessing, inference, and
  postprocessing with betto_onnxrt.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  betto_onnxrt:
    path: ../

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
