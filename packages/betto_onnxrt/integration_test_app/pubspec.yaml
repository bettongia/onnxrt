name: betto_onnxrt_test_app
description: Integration test harness for betto_onnxrt — verifies that the
  native-assets build hook stages the ORT binary and that OnnxRuntime.load()
  and OnnxSession.run() work correctly on the target platform.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  betto_onnxrt:
    path: ../
  betto_onnxrt_ios:
    path: ../../betto_onnxrt_ios

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/identity_float32.onnx
