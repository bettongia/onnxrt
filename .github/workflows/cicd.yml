name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      # Cache the downloaded ORT binary by ORT version.
      # The cache is effective when the cached file's SHA-256 matches the
      # digest in version_onnx.json; a digest mismatch triggers a re-download.
      - name: Cache ORT binary
        uses: actions/cache@v5
        with:
          path: .dart_tool/betto_onnxrt
          key: ort-${{ runner.os }}-${{ hashFiles('VERSION_ONNX') }}

      # cicd_linux is self-contained: it runs dart pub get (triggering the build
      # hook to download the ORT binary), creates the unversioned symlink, exports
      # LD_LIBRARY_PATH, then runs the full quality gate via a sub-make.
      - run: make cicd_linux

  test-macos:
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache ORT binary
        uses: actions/cache@v5
        with:
          path: .dart_tool/betto_onnxrt
          key: ort-${{ runner.os }}-${{ hashFiles('VERSION_ONNX') }}

      # make cicd_macos runs: prepare_flutter → dart test → dart doc →
      # macos_test (Flutter integration test). Quality gate (license, format,
      # analyze) runs only in cicd_linux; macOS and Windows skip it to avoid
      # redundant work. The Flutter integration test is the authoritative ORT
      # load+inference check on macOS; dart test skips OnnxSession cases in JIT
      # mode because the macOS framework path only exists after a Flutter/AOT build.
      - run: make cicd_macos

  test-windows:
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache ORT binary
        uses: actions/cache@v5
        with:
          path: .dart_tool/betto_onnxrt
          key: ort-${{ runner.os }}-${{ hashFiles('VERSION_ONNX') }}

      - name: Download ORT binary (triggers build hook)
        run: dart pub get

      # onnxruntime.dll is unversioned; adding its directory to PATH lets
      # DynamicLibrary.open('onnxruntime.dll') find it in dart test (JIT mode).
      - name: Add ORT DLL directory to PATH (Windows)
        run: |
          $ORT_VER = python3 -c "import json; print(json.load(open('version_onnx.json'))['platforms']['windows-x64']['version'])"
          $ORT_CACHE = ".dart_tool\betto_onnxrt\$ORT_VER"
          $AbsPath = Join-Path (Get-Location).Path $ORT_CACHE
          "$AbsPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - run: make cicd_windows
