name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      # Cache the downloaded ORT binary by ORT version.
      # The cache is effective when the cached file's SHA-256 matches the
      # digest in version_onnx.json; a digest mismatch triggers a re-download.
      - name: Cache ORT binary
        uses: actions/cache@v5
        with:
          path: packages/betto_onnxrt/.dart_tool/betto_onnxrt
          key: ort-${{ runner.os }}-${{ hashFiles('packages/betto_onnxrt/VERSION_ONNX') }}

      # cicd_linux is self-contained: it runs dart pub get (triggering the build
      # hook to download the ORT binary), creates the unversioned symlink, exports
      # LD_LIBRARY_PATH, then runs the full quality gate via a sub-make.
      - run: make cicd_linux

      - run: make doc_site

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./site"

  deployment:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  test-macos:
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache ORT binary
        uses: actions/cache@v5
        with:
          path: packages/betto_onnxrt/.dart_tool/betto_onnxrt
          key: ort-${{ runner.os }}-${{ hashFiles('packages/betto_onnxrt/VERSION_ONNX') }}

      # make cicd_macos runs: prepare_flutter → dart test → dart doc →
      # macos_test (Flutter integration test). Quality gate (license, format,
      # analyze) runs only in cicd_linux; macOS and Windows skip it to avoid
      # redundant work. The Flutter integration test is the authoritative ORT
      # load+inference check on macOS; dart test skips OnnxSession cases in JIT
      # mode because the macOS framework path only exists after a Flutter/AOT build.
      - run: make cicd_macos

  test-windows:
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache ORT binary
        uses: actions/cache@v5
        with:
          path: packages/betto_onnxrt/.dart_tool/betto_onnxrt
          key: ort-${{ runner.os }}-${{ hashFiles('packages/betto_onnxrt/VERSION_ONNX') }}

      # Run dart test directly from PowerShell so $env:PATH is inherited with
      # no intermediate shell (Make → sh.exe) that could translate away the
      # Windows DLL directory. The ORT hook runs at the start of dart test
      # (before any test code) and downloads the DLL; the directory is already
      # on PATH at that point so DynamicLibrary.open('onnxruntime.dll') works.
      - name: Run dart pub get
        working-directory: packages/betto_onnxrt
        run: |
          dart pub global activate coverage
          dart pub get
        shell: pwsh

      - name: Run cicd_windows
        working-directory: packages/betto_onnxrt
        run: |
          $ORT_VER = (Get-Content version_onnx.json | ConvertFrom-Json).platforms.'windows-x64'.version
          $env:PATH = "$(Join-Path (Get-Location).Path ".dart_tool\betto_onnxrt\$ORT_VER");$env:PATH"
          dart test
        shell: pwsh
